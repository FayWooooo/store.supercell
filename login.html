    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
    
        if (loginBtn) {
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const emailValue = emailInput ? emailInput.value.trim() : '';
    
                if (emailValue && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
                    // 1. 產生 6 位數隨機驗證碼
                    const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
                    
                    // 2. 儲存資料到 localStorage 供驗證頁使用
                    localStorage.setItem('user_email', emailValue);
                    localStorage.setItem('sent_otp', otpCode);
    
                    // 3. 顯示發送狀態
                    loginBtn.innerText = 'Sending...';
                    loginBtn.style.opacity = '0.7';
                    loginBtn.style.pointerEvents = 'none'; // 防止重複點擊
    
                    // 4. 使用 EmailJS 發送
                    const templateParams = {
                        to_email: emailValue,
                        otp_code: otpCode
                    };
    
                    emailjs.send('SCCAPTCHA', 'template_9zjyb6s', templateParams)
                        .then(function() {
                            console.log('驗證碼已發送:', otpCode);
                            window.location.href = 'verify.html';
                        }, function(error) {
                            alert('發送失敗，請檢查 EmailJS 設定');
                            console.log('Error:', error);
                            loginBtn.innerText = '登入';
                            loginBtn.style.opacity = '1';
                            loginBtn.style.pointerEvents = 'auto';
                        });
                } else {
                    alert('請輸入有效的 Email 地址');
                }
            });
        }
    });
